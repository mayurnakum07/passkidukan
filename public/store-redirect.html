<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Comm Store - Download App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: #667eea;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .store-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
        }
        
        .store-name {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }
        
        .store-type {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .download-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
        }
        
        .play-store {
            background: #000;
            color: white;
        }
        
        .app-store {
            background: #007AFF;
            color: white;
        }
        
        .store-icon {
            width: 24px;
            height: 24px;
        }
        
        .fallback {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">E</div>
        <h1>E-Comm Store</h1>
        
        <div id="store-info" class="store-info" style="display: none;">
            <div id="store-name" class="store-name"></div>
            <div id="store-type" class="store-type"></div>
        </div>
        
        <p>Download our app to browse products and place orders from this store!</p>
        
        <div class="download-buttons">
            <a href="https://play.google.com/store/apps/details?id=com.yourcompany.ecommexpo" class="download-btn play-store">
                <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.61 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
                </svg>
                Download for Android
            </a>
            
            <a href="https://apps.apple.com/app/e-comm-expo/id1234567890" class="download-btn app-store">
                <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71,19.5C17.88,20.74 17,21.95 15.66,21.97C14.32,22 13.89,21.18 12.37,21.18C10.84,21.18 10.37,21.95 9.1,22C7.79,22.05 6.8,20.68 5.96,19.47C4.25,17 2.94,12.45 4.7,9.39C5.57,7.87 7.13,6.91 8.82,6.88C10.1,6.86 11.32,7.75 12.11,7.75C12.89,7.75 14.37,6.68 15.92,6.84C16.57,6.87 18.39,7.1 19.56,8.82C19.47,8.88 17.39,10.1 17.41,12.63C17.44,15.65 20.06,16.66 20.09,16.67C20.06,16.74 19.67,18.11 18.71,19.5M13,3.5C13.73,2.67 14.94,2.04 15.94,2C16.07,3.17 15.6,4.35 14.9,5.19C14.21,6.04 13.07,6.7 11.95,6.61C11.8,5.46 12.36,4.26 13,3.5Z"/>
                </svg>
                Download for iOS
            </a>
        </div>
        
        <div class="fallback">
            <strong>Can't install the app?</strong><br>
            You can also browse stores and products on our website.
        </div>
    </div>

    <script>
        // Extract store information from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const storeId = urlParams.get('storeId');
        const storeName = urlParams.get('storeName');
        const storeType = urlParams.get('type');
        
        if (storeName) {
            document.getElementById('store-info').style.display = 'block';
            document.getElementById('store-name').textContent = storeName;
            if (storeType) {
                document.getElementById('store-type').textContent = storeType.charAt(0).toUpperCase() + storeType.slice(1) + ' Store';
            }
        }
        
        // Auto-redirect to app if it's installed (optional)
        // This would require app-specific URL schemes
        if (storeId) {
            // Try to open the app with the store ID
            const appUrl = `ecomm://store/${storeId}`;
            const fallbackUrl = window.location.href;
            
            // Create a hidden iframe to attempt app launch
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = appUrl;
            document.body.appendChild(iframe);
            
            // Remove iframe after a short delay
            setTimeout(() => {
                document.body.removeChild(iframe);
            }, 1000);
        }
    </script>
</body>
</html>
